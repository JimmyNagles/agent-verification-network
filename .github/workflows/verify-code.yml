name: Agent Labor Market — Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  verify:
    runs-on: ubuntu-latest
    name: AI Code Verification
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify changed files
        id: verify
        run: |
          API_URL="https://agent-verification-network-production.up.railway.app"

          # Get changed Python/JS/TS/Sol files
          git diff --name-only --diff-filter=ACMR ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep -E '\.(py|js|jsx|ts|tsx|sol)$' | head -10 > /tmp/changed_files.txt

          echo "Changed files:"
          cat /tmp/changed_files.txt

          REPORT=""
          TOTAL_ISSUES=0
          CRITICAL=0

          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            [ ! -f "$FILE" ] && continue

            echo "Verifying: $FILE"

            # Skip files larger than 10KB
            SIZE=$(wc -c < "$FILE")
            if [ "$SIZE" -gt 10000 ]; then
              REPORT="${REPORT}### \`${FILE}\`\n> Skipped (file too large)\n\n"
              continue
            fi

            # Send to verification API
            CODE_JSON=$(python3 -c "import json; print(json.dumps(open('$FILE').read()))")

            RESULT=$(curl -s -X POST "$API_URL/verify" \
              -H "Content-Type: application/json" \
              -H "X-API-Key: ${{ secrets.VERIFY_API_KEY }}" \
              -d "{\"code\": $CODE_JSON, \"intent\": \"Production code in $FILE — check for bugs, security issues, and logic errors\", \"language\": \"python\"}" \
              --max-time 60 2>/dev/null || echo '{}')

            echo "Result: $RESULT"

            # Parse result
            PASSED=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('passed', True))" 2>/dev/null || echo "True")
            CONFIDENCE=$(echo "$RESULT" | python3 -c "import sys,json; print(f\"{json.load(sys.stdin).get('confidence', 0):.0%}\")" 2>/dev/null || echo "0%")

            ISSUES_TEXT=$(echo "$RESULT" | python3 -c "
          import sys,json
          try:
              d = json.load(sys.stdin)
              issues = d.get('issues', [])
              if not issues:
                  print('No issues found.')
              else:
                  for i in issues:
                      sev = i.get('severity', 'medium')
                      desc = i.get('description', '')
                      line = i.get('line', '?')
                      typ = i.get('type', 'issue')
                      icon = '🔴' if sev == 'critical' else '🟡' if sev in ('high','medium') else '🟢'
                      print(f'- {icon} **{typ}** (line {line}): {desc}')
          except:
              print('Verification failed.')
          " 2>/dev/null || echo "Verification failed.")

            NUM_ISSUES=$(echo "$RESULT" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('issues', [])))" 2>/dev/null || echo "0")
            NUM_CRITICAL=$(echo "$RESULT" | python3 -c "import sys,json; print(len([i for i in json.load(sys.stdin).get('issues', []) if i.get('severity') == 'critical']))" 2>/dev/null || echo "0")
            AGENT_ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('agent_id', 'local'))" 2>/dev/null || echo "local")
            MODE=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('mode', 'standalone'))" 2>/dev/null || echo "standalone")

            TOTAL_ISSUES=$((TOTAL_ISSUES + NUM_ISSUES))
            CRITICAL=$((CRITICAL + NUM_CRITICAL))

            if [ "$PASSED" = "False" ]; then
              REPORT="${REPORT}### ❌ \`${FILE}\` — Failed (confidence: ${CONFIDENCE})\n**Miner:** \`${AGENT_ID}\` | **Mode:** ${MODE}\n${ISSUES_TEXT}\n\n"
            else
              REPORT="${REPORT}### ✅ \`${FILE}\` — Passed (confidence: ${CONFIDENCE})\n**Miner:** \`${AGENT_ID}\` | **Mode:** ${MODE}\n${ISSUES_TEXT}\n\n"
            fi

          done < /tmp/changed_files.txt

          # Handle no files
          if [ -z "$REPORT" ]; then
            REPORT="No code files changed in this PR."
          fi

          echo "total_issues=$TOTAL_ISSUES" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT

          # Write report to file to avoid escaping issues
          echo -e "$REPORT" > /tmp/report.md
          cat /tmp/report.md

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/report.md', 'utf8');
            const totalIssues = parseInt('${{ steps.verify.outputs.total_issues }}') || 0;
            const critical = parseInt('${{ steps.verify.outputs.critical }}') || 0;

            const header = critical > 0
              ? `## 🔴 Agent Labor Market — ${totalIssues} issue(s) found (${critical} critical)`
              : totalIssues > 0
              ? `## 🟡 Agent Labor Market — ${totalIssues} issue(s) found`
              : `## ✅ Agent Labor Market — Code looks good`;

            const body = `${header}\n\n${report}\n---\n*Verified by [Agent Labor Market](https://agent-verification-network.vercel.app) — AI-powered code review by competing miner agents.*\n*[On-chain jobs](https://basescan.org/address/0xE4ED0C73B9c8c2153a2d39901309270c40Bee1a1) · [Protocol](https://agent-verification-network-production.up.railway.app/protocol) · [skill.md](https://agent-verification-network-production.up.railway.app/skill.md) · [GitHub](https://github.com/JimmyNagles/agent-verification-network)*`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

            if (critical > 0) {
              core.setFailed(`Verification failed: ${critical} critical issue(s) found`);
            }
